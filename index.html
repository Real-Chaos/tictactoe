<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
</head>
<body>
    <!-- <div class="beforeGameLayout"> -->
        <h1 class="title">Tic Tac Toe</h1>
        <div class="beforeGameLayout">
        <div class="beforeGame">
            <div class="player1Div">
                <div class="playerDivImg">
                    <img src="images/playerIcon.gif" alt="">
                </div>
                <div class="playerDivName">
                    <input type="text" placeholder="Name">
                </div>
            </div>

            <div class="player2Div">
                <div class="playerDivImg">
                    <img src="images/player2Icon.gif" alt="">
                    <i class="fas fa-arrow-circle-left leftArrow"></i>
                    <i class="fas fa-arrow-circle-right rightArrow"></i>
                </div>
                <div class="playerDivName player2Name">
                    <input type="text" placeholder="Name">
                </div>
            </div>
        </div>
    
    <h1 class="vs">VS</h1>
    <button class="play">Play</button>
</div>

<div class="gameLayout">

</div>
<h1 class="turnTeller"></h1>
<h1 class="winner"></h1>
<button class="restart">Play Again</button>
    
    

    <script src="app.js"></script>
</body>
</html>
